name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve pymyhondaplus? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: >
        What problem does this feature solve, or what use case does it enable?
      placeholder: "I'd like to be able to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: >
        Describe how you'd like this to work — CLI flags, API methods,
        output format, etc.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this relate to?
      options:
        - "CLI"
        - "Python API"
        - "Authentication"
        - "Translations / i18n"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: >
        Any workarounds or alternative approaches you've thought about.

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: >
        Any other context, screenshots, or references that help explain
        the request.
